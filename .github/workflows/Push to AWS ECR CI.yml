name: Push to AWS ECR CI

on:
  push:
    branches: [ "master" ]

env:
  IMAGE_TAG: ${{ github.run_number }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: java-web-app-docker-image
  ECR_REGISTRY: <YOUR_AWS_ACCOUNT_ID>.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Job
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    # Configure AWS credentials
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # Login to AWS ECR
    - name: Login to AWS Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # Build Docker image
    - name: Build Docker Image
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker images

    # Push to ECR
    - name: Push Docker Image to ECR
      run: |
        echo "Pushing Docker Image to AWS ECR"
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        # docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        # docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  Run_Docker_Image:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to AWS Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Pull Docker Image
      run: docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

    - name: Run Docker Image
      run: docker run -d -p 8080:8080 ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

    - name: List Docker Containers
      run: docker ps

    - name: Wait for App Startup
      run: sleep 30

    - name: Test App
      run: curl http://localhost:8080/Java-Web-Application
