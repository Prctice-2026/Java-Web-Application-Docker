name: Docker Image CI

on:
  push:
    branches: [ "master" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout Job
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: mvn -B package --file pom.xml
      
    - name: Build the Docker image
      #run: docker build . --file Dockerfile --tag my-image-name:$(date +%s)
      run: |
        docker build -t registory/java-web-app-docker-image:${{ github.sha }} .
        docker images

    - name: Save Docker image
      run: docker save registory/java-web-app-docker-image:1 -o image.tar

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: image.tar
        
  List_Docker_Images:

    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: docker-image

    - name: Load Docker Image
      run: docker load -i image.tar

    - name: List Images
      run: docker images

    - name: Run Docker Image
      run: docker run -d -p 8080:8080 registory/java-web-app-docker-image:1

    - name: list Docker container
      run: docker ps

    - name: Get Runner Public IP
      run: curl ifconfig.me

    - name: Check Container Logs
      run: docker logs $(docker ps -q)

    - name: Wait for App Startup
      run: sleep 30

    - name: Test App Locally Inside Runner
      run: curl http://localhost:8080/Java-Web-Application

      
