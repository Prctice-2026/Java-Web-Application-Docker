name: Push to AWS ECR and Deploy to EKS CI

on:
  push:
    branches: [ "master" ]

env:
  IMAGE_TAG: ${{ github.run_number }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: java-web-app-docker-image
  ECR_REGISTRY: <YOUR_AWS_ACCOUNT_ID>.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

  # EKS variables
  EKS_CLUSTER_NAME: my-eks-cluster
  K8S_DEPLOYMENT_NAME: java-web-app-deployment
  # Optional this is for check rollut status
  K8S_CONTAINER_NAME: java-web-app-container

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Job
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    # Configure AWS credentials
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # Login to ECR
    - name: Login to AWS Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # Build Docker image
    - name: Build Docker Image
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker images

    # Push Docker image
    - name: Push Docker Image to ECR
      run: |
        echo "Pushing Docker Image to AWS ECR"
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy_to_eks:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Job
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME

      - name: Check Kubernetes Nodes
        run: kubectl get nodes

      - name: Update Image Tag in Deployment YAML
        run: |
          sed -i "s|image: .*|image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|g" java-web-app.yml
          cat java-web-app.yml

      - name: Deploy to EKS
        run: kubectl apply -f java-web-app.yml

      - name: Verify Deployment Rollout
        run: kubectl rollout status deployment/$K8S_DEPLOYMENT_NAME

      - name: Check Running Pods
        run: kubectl get pods

      - name: Check Services
        run: kubectl get svc
