name: Manual Push to Docker Hub CI

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag'
        required: true
        default: 'latest'

env:
  IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME }}/java-web-application-docker
  IMAGE_TAG: ${{ github.event.inputs.image_tag }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Job
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          echo "Listing Docker Images"
          docker images

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker Image
        run: |
          echo "Pushing Docker image to Docker Hub"
          docker push $IMAGE_NAME:$IMAGE_TAG

  run_docker_image:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull Docker Image
        run: docker pull $IMAGE_NAME:$IMAGE_TAG

      - name: List Docker Images
        run: docker images

      - name: Run Docker Image
        run: docker run -d -p 8080:8080 $IMAGE_NAME:$IMAGE_TAG

      - name: List Docker Containers
        run: docker ps

      - name: Get Runner Public IP
        run: curl ifconfig.me

      - name: Check Container Logs
        run: docker logs $(docker ps -q)

      - name: Wait for App Startup
        run: sleep 30

      - name: Test App Locally Inside Runner
        run: curl http://localhost:8080/Java-Web-Application
