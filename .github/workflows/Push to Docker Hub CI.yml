name: Push to Docker Hub CI

on:
  push:
    branches: [ "master" ]
env:
  IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME }}/java-web-application-docker
  IMAGE_TAG: ${{github.run_number}}

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Job
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: mvn clean package
      
    - name: Build the Docker image
      #run: docker build . --file Dockerfile --tag my-image-name:$(date +%s)
      run: |
        docker build -t ${{env.IMAGE_NAME}}:$IMAGE_TAG .
        echo "Listing Docker Images"
        docker images

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Push Docker Image
      run: |
        docker push $IMAGE_NAME:$IMAGE_TAG
        
  Run_Docker_Images:

    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Pull Docker Image
      run: docker pull $IMAGE_NAME:$IMAGE_TAG

    - name: List Images
      run: docker images

    - name: Run Docker Image
      run: docker run -d -p 8080:8080 $IMAGE_NAME:$IMAGE_TAG

    - name: list Docker container
      run: docker ps

    - name: Get Runner Public IP
      run: curl ifconfig.me

    - name: Check Container Logs
      run: docker logs $(docker ps -q)

    - name: Wait for App Startup
      run: sleep 30

    - name: Test App Locally Inside Runner
      run: curl http://localhost:8080/Java-Web-Application

      
